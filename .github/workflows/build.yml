name: Build (Linux)
on: workflow_dispatch

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Get repository code
        uses: actions/checkout@v6

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libqalculate-dev libopus0
          curl -o dpp.deb https://dl.dpp.dev
          sudo dpkg -i dpp.deb

      - name: Release Build With Cmake
        run: |
          cmake -DCMAKE_BUILD_TYPE=Release -S $PWD -B cmake-build-release
          cmake --build cmake-build-release

      - name: Upload Release Build
        uses: actions/upload-artifact@v6
        with:
          name: "juno"
          path: "cmake-build-release/juno"